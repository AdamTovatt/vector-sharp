name: Publish NuGet

on:
  push:
    tags:
      - '*-v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Parse tag
      id: tag
      run: |
        TAG="${GITHUB_REF_NAME}"
        PACKAGE="${TAG%-v*}"
        VERSION="${TAG##*-v}"
        echo "PACKAGE=${PACKAGE}" >> $GITHUB_OUTPUT
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
        echo "Publishing VectorSharp.${PACKAGE^} version ${VERSION}"

    - name: Resolve project
      id: project
      run: |
        PACKAGE="${{ steps.tag.outputs.PACKAGE }}"
        # Map tag prefix to project name
        case "$PACKAGE" in
          storage)     PROJECT="VectorSharp.Storage" ;;
          embedding)   PROJECT="VectorSharp.Embedding" ;;
          nomic-embed) PROJECT="VectorSharp.Embedding.NomicEmbed" ;;
          *)           echo "Unknown package: $PACKAGE" && exit 1 ;;
        esac
        echo "PROJECT=${PROJECT}" >> $GITHUB_OUTPUT
        echo "Project: ${PROJECT}"

    - name: Download model files (if publishing nomic-embed)
      if: steps.tag.outputs.PACKAGE == 'nomic-embed'
      run: bash tools/download-nomic-model.sh

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release -p:Version=${{ steps.tag.outputs.VERSION }}

    - name: Test
      run: dotnet test --no-build --configuration Release --filter "FullyQualifiedName!~PerformanceTest&TestCategory!=RequiresModel"

    - name: Pack
      run: dotnet pack ${{ steps.project.outputs.PROJECT }} --no-build --configuration Release -p:Version=${{ steps.tag.outputs.VERSION }} --output ./nupkgs

    - name: Publish to NuGet
      run: dotnet nuget push ./nupkgs/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
